<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="40" height="40">
  <defs>
    <linearGradient id="antigravity-spectrum" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1e90ff;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#00fa9a;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff4500;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <path d="M20,80 Q20,60 50,20 Q80,60 80,80" 
        stroke="url(#antigravity-spectrum)" 
        stroke-width="12" 
        fill="none" 
        stroke-linecap="round"
        filter="url(#glow)" />
</svg>
